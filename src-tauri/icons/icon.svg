<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Mousepad body -->
  <rect x="8" y="32" width="112" height="72" rx="12" ry="12" fill="url(#bg)"/>
  <!-- Display screen on mousepad -->
  <rect x="16" y="40" width="96" height="56" rx="6" ry="6" fill="#0a0a1a" opacity="0.9"/>
  <!-- Screen glow effect -->
  <rect x="20" y="44" width="88" height="48" rx="4" ry="4" fill="#1a1a3a" opacity="0.8"/>
  <!-- Small decorative dots representing display content -->
  <circle cx="40" cy="68" r="4" fill="#6366f1" opacity="0.8"/>
  <circle cx="60" cy="60" r="3" fill="#a855f7" opacity="0.8"/>
  <circle cx="80" cy="72" r="5" fill="#06b6d4" opacity="0.7"/>
  <circle cx="95" cy="58" r="3" fill="#6366f1" opacity="0.8"/>
  <!-- USB cable -->
  <rect x="56" y="96" width="16" height="8" rx="2" fill="#4b5563"/>
  <rect x="60" y="100" width="8" height="20" rx="1" fill="#374151"/>
</svg>
